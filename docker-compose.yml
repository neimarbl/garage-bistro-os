services:
  db-master:
    image: postgres:16-alpine
    container_name: gb_db_master
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garage_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-garage_bistro_prod}
    ports:
      - "5432:5432"
    volumes:
      - pg_master_data:/var/lib/postgresql/data
    networks:
      - garage_lan_net
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garage_admin} -d ${POSTGRES_DB:-garage_bistro_prod}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-slave:
    image: postgres:16-alpine
    container_name: gb_db_slave
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garage_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-garage_bistro_prod}
    depends_on:
      - db-master
    volumes:
      - pg_slave_data:/var/lib/postgresql/data
    networks:
      - garage_lan_net
    restart: unless-stopped

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: garage_bistro_api:v1
    container_name: gb_backend_api
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-garage_admin}:${POSTGRES_PASSWORD:-secure_password_change_me}@db-master:5432/${POSTGRES_DB:-garage_bistro_prod}
    ports:
      - "8080:8000"
    networks:
      - garage_lan_net
    # 🔄 Garante que o contêiner reinicie sozinho se o banco recusar a primeira conexão:
    restart: always
    # 📝 Lista simples aceita pela sua versão do docker-compose:
    depends_on:
      - db-master

  # 🟢 ADICIONADO: O Motor do PWA Omnichannel na LAN da Garagem
  frontend-pwa:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: garage_bistro_pwa:v1
    container_name: gb_frontend_pwa
    ports:
      - "5173:80" # Expõe o app na porta 5173 externa, batendo na porta 80 do Nginx
    networks:
      - garage_lan_net
    restart: always
    depends_on:
      - backend-api

volumes:
  pg_master_data:
  pg_slave_data:

networks:
  garage_lan_net:
    driver: bridge
