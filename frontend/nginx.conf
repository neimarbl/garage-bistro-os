server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Encaminha qualquer rota virtual de volta para o index.html do React
        try_files $uri $uri/ /index.html;
    }

    # Bloqueia logs inúteis e melhora performance de cache de assets locais
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
